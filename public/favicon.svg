<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Deep Cobalt Blue for the fuselage (sharp & elegant) -->
    <linearGradient id="fuselageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#1e3b8a" />
    </linearGradient>
    <!-- Premium Metallic Gold for the wings & tail -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Clean, sharp dark circular glass border -->
  <circle cx="256" cy="256" r="236" fill="rgba(11, 15, 26, 0.85)" stroke="rgba(0, 242, 254, 0.25)" stroke-width="6" />
  
  <!-- Aerodynamic, sharp, modern jet plane silhouette -->
  <g transform="translate(256, 256) rotate(-28)">
    <!-- Rear Wing (Left Wing, behind body) -->
    <path d="M -20,-20 L -140,-120 C -160,-130 -160,-120 -130,-90 L -10,0 Z" fill="url(#goldGrad)" opacity="0.85" />
    
    <!-- Vertical Tail Fin -->
    <path d="M -130,-5 L -200,-50 C -210,-55 -210,-45 -180,-30 L -120,5 Z" fill="url(#goldGrad)" />
    <!-- Horizontal Tail Fin -->
    <path d="M -140,5 L -180,20 C -190,25 -190,20 -170,12 L -130,0 Z" fill="url(#goldGrad)" opacity="0.8" />
    
    <!-- Fuselage: Ultra-sleek supersonic jet shape -->
    <path d="M 180,-6 C 140,-18 50,-24 -70,-20 C -130,-16 -170,0 -160,8 C -150,16 -110,22 -40,20 C 60,16 140,10 180,-6 Z" fill="url(#fuselageGrad)" filter="url(#subtleGlow)" />
          
    <!-- Sleek Cockpit and Window strip (High tech, single continuous curve) -->
    <path d="M 140,-10 C 120,-14 90,-14 60,-12 C 85,-7 115,-7 140,-10 Z" fill="#ffffff" opacity="0.95" />
    <path d="M 40,-10 C 20,-10 -60,-6 -100,-2 L -100,0 C -60,-4 20,-8 40,-10 Z" fill="#ffffff" opacity="0.8" />

    <!-- Fore Wing (Right Wing, in front) -->
    <path d="M 20,8 L 90,140 C 100,155 115,155 105,130 L 10,-2 Z" fill="url(#goldGrad)" filter="url(#subtleGlow)" />
    
    <!-- Elegant Engine Capsule under the Fore Wing -->
    <path d="M 45,65 C 55,80 65,95 72,90 C 78,85 62,60 45,52 Z" fill="#0f172a" stroke="#d4af37" stroke-width="2.5" />
    <!-- Jet Thrust Flame/Glow (Sharp & clean) -->
    <polygon points="34,73 24,78 28,68 38,64" fill="#00f2fe" filter="url(#subtleGlow)" />
  </g>
  
  <!-- Subtle speed arcs in background representing aerodynamic wind flow -->
  <path d="M 100,280 C 130,220 220,180 320,180" fill="none" stroke="rgba(0, 242, 254, 0.12)" stroke-width="4" stroke-dasharray="10 15" />
  <path d="M 60,320 C 100,240 220,190 350,210" fill="none" stroke="rgba(212, 175, 55, 0.08)" stroke-width="3" stroke-dasharray="6 12" />
</svg>
