<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Royal Blue gradient for Fuselage -->
    <linearGradient id="fuselageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <!-- Vibrant Gold gradient for Wings and Stabilizers -->
    <linearGradient id="goldAccentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Soft Glassy Cloud gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.45)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.15)" />
    </linearGradient>
    <!-- Outer Glow filter for plane body -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Circular Glassmorphic Container -->
  <circle cx="256" cy="256" r="236" fill="rgba(15, 23, 42, 0.65)" stroke="url(#fuselageGrad)" stroke-width="8" stroke-opacity="0.3" />
  
  <!-- Cartoon Airplane Group flying diagonally upwards -->
  <g transform="translate(250, 240) rotate(-22)">
    
    <!-- 1. Left Wing (Behind Fuselage) -->
    <path d="M -40,-25 C -100,-70 -160,-75 -170,-55 C -170,-35 -100,-5 -40,5 Z" fill="url(#goldAccentGrad)" opacity="0.95" />
    
    <!-- 2. Tail Section -->
    <!-- Vertical Stabilizer (Fin) -->
    <path d="M -120,5 C -150,55 -190,65 -180,75 C -170,85 -130,55 -100,5 Z" fill="url(#goldAccentGrad)" />
    <!-- Horizontal Stabilizer -->
    <path d="M -140,15 C -170,35 -190,35 -180,45 C -170,50 -140,35 -120,15 Z" fill="url(#goldAccentGrad)" opacity="0.8" />
    
    <!-- 3. Fuselage (Main Body of the Airplane) -->
    <!-- Plump, modern, aerodynamically cute cartoon curve -->
    <path d="M 160,-15 C 130,-45 60,-45 -60,-25 C -140,-10 -180,15 -150,30 C -120,45 -20,35 80,15 C 145,2 175,-2 160,-15 Z" fill="url(#fuselageGrad)" filter="url(#glow)" />
    
    <!-- 4. Cockpit Windshield (Cute and highly visible) -->
    <path d="M 115,-20 C 105,-28 85,-26 75,-20 C 90,-14 110,-14 115,-20 Z" fill="#ffffff" />
    
    <!-- 5. Passenger Windows -->
    <circle cx="40" cy="-11" r="8" fill="#ffffff" opacity="0.9" />
    <circle cx="10" cy="-8" r="8" fill="#ffffff" opacity="0.9" />
    <circle cx="-20" cy="-5" r="8" fill="#ffffff" opacity="0.9" />
    <circle cx="-50" cy="-2" r="8" fill="#ffffff" opacity="0.9" />
    
    <!-- 6. Right Wing (In front of Fuselage) -->
    <path d="M 10,15 C 50,75 100,125 120,120 C 130,105 80,45 10,8 Z" fill="url(#goldAccentGrad)" />
    
    <!-- 7. Jet Engine (Under Right Wing) -->
    <rect x="50" y="60" width="38" height="20" rx="10" fill="#0f172a" stroke="#d97706" stroke-width="4" transform="rotate(32 50 60)" />
    <!-- Engine Thrust/Glow -->
    <ellipse cx="36" cy="74" rx="8" ry="12" fill="#00f2fe" filter="url(#glow)" transform="rotate(32 36 74)" />
  </g>

  <!-- 8. Soft Cloud Swoosh under the Plane -->
  <path d="M 80,370 C 110,340 150,340 170,365 C 195,350 235,350 255,380 C 275,365 315,365 335,390 C 355,380 395,380 415,405 C 415,435 80,435 80,370 Z" fill="url(#cloudGrad)" opacity="0.45" />
</svg>
